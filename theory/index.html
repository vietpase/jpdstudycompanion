    <!-- Local counter (nếu không để trong index.js) -->

      const KEY = "demo_local_visits";
      let visits = localStorage.getItem(KEY);
      visits = visits ? parseInt(visits) + 1 : 1;
      localStorage.setItem(KEY, visits);
      document.getElementById("visitor-count").innerText = visits;
